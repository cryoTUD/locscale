site_name: LocScale-2.0
site_url: https://github.com/cryoTUD/locscale
site_author: Arjen Jakobi
site_description: >-
  Documentation for LocScale-2.0, an automated workflow for confidence-weighted optimisation of cryoEM maps.
# Repository
repo_name: cryoTUD/locscale
repo_url: https://github.com/cryoTUD/locscale

# Copyright
copyright: Copyright &copy; 2025 - 2025 Arjen Jakobi

theme:
  icon:
    logo: material/home-circle
  name: material
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: light blue
      accent: light blue
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: blue grey
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to light mode
  features:
    - navigation.instant
    #- navigation.tabs
    #- navigation.top
    #- navigation.tracking
    - search.highlight
    - search.suggest
    # - toc.follow
    # - content.code.annotate
    - content.tabs.link

markdown_extensions:
  - admonition
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - md_in_html
  - pymdownx.arithmatex:
      generic: true


extra:
  analytics:
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/emoticon-happy-outline
          name: This page was helpful
          data: 1
          note: >-
            Thanks for your feedback!
        - icon: material/emoticon-sad-outline
          name: This page could be improved
          data: 0
          note: >- 
            Thanks for your feedback! Help us improve this page by
            using our <a href="..." target="_blank" rel="noopener">feedback form</a>.

nav:
  - Introduction: index.md
  - Install: install.md
  #- Troubleshooting:
  #    - Install troubles: Troubleshooting/install_trbl.md
  #    - ChimeraX: Troubleshooting/chimX_trbl.md
  #    - Other: Troubleshooting/other_trbl.md
  #- Tutorials:
  #    - GUI overview: Tutorials/gui.md
  #    - Intro tutorial: Tutorials/intro.md
  #    - I want to:
  #        - Estimate relative resolution: Tutorials/case/est_res.md
  #        - Estimate occupancy: Tutorials/case/est_occ.md
  #        - Modify a map: Tutorials/case/modification.md
  #        - Supress solvent: Tutorials/case/supp_solv.md
  #        - Make a subtraction mask : Tutorials/case/sub_mask.md
  #        - Use a solvent definition: Tutorials/case/soldef.md
  #- Showcase/gallery:
  #  - View all: gallery/index.md
  #  - Individual:
  #      - From the paper:
  #        - Synthetic: gallery/synthetic.md
  #        - Mass: gallery/mass.md
